{% set name = "lsof" %}
{% set version = "4.99.5" %}
{% set sha256 = "3c591556c665196e0aada5982ff43c75e248187bad78bb1368d8fb9c1c527e6e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/lsof-org/lsof/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  skip: true  # [win]
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - perl
    - sed

test:
  commands:
    - lsof -v 2>&1 | grep -qF '{{ version }}'
    - lsof .

about:
  home: http://people.freebsd.org/~abe/
  license: BSD-compatible
  license_file: COPYING
  summary: LiSt Open Files
  description: |
    The free, open-source, Unix administrative tool lsof (for LiSt Open Files)
    displays information about files open to Unix processes.
  doc_url: https://lsof.readthedocs.io/

extra:
  recipe-maintainers:
    - danielnachun
    - keuv-grvl
